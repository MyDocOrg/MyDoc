<mat-card>
  <mat-card-content>
    <!-- Header with title and action button -->
    <!-- <div class="d-flex justify-content-between align-items-center m-b-16">
      <mat-card-title class="mb-0">Gestión de Citas</mat-card-title>
      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <span class="iconify" data-icon="mdi:plus"></span>
        <span>Nueva Cita</span>
      </button>
    </div> -->

    <!-- Calendar Controls -->
    <div class="d-flex justify-content-between align-items-center flex-wrap">

      <!-- Back, Today, Next navigation -->
      <div class="d-flex gap-2 mb-2 mb-md-0">
        <button mat-button mwlCalendarPreviousView [view]="view" [(viewDate)]="viewDate"
          (viewDateChange)="closeOpenMonthViewDay()">
          Anterior
        </button>
        <button mat-raised-button color="accent" mwlCalendarToday [(viewDate)]="viewDate">
          Hoy
        </button>
        <button mat-button mwlCalendarNextView [view]="view" [(viewDate)]="viewDate"
          (viewDateChange)="closeOpenMonthViewDay()">
          Siguiente
        </button>
      </div>

      <!-- Current Date Range Label -->
      <div class="mat-body-1 mb-2 mb-md-0 f-w-600 f-s-16">
        {{ viewDate | calendarDate:(view + 'ViewTitle'):'es' }}
      </div>

      <!-- View Selection -->
      <div class="d-flex gap-2">
        <button [color]="view === CalendarView.Month ? 'primary' : ''" mat-stroked-button
          (click)="setView(CalendarView.Month)" [class.active]="view === CalendarView.Month">
          Mes
        </button>
        <button [color]="view === CalendarView.Week ? 'primary' : ''" mat-stroked-button
          (click)="setView(CalendarView.Week)" [class.active]="view === CalendarView.Week">
          Semana
        </button>
        <button [color]="view === CalendarView.Day ? 'primary' : ''" mat-stroked-button
          (click)="setView(CalendarView.Day)" [class.active]="view === CalendarView.Day">
          Día
        </button>
      </div>
    </div>

    <!-- Calendar View -->
    <div class="calendar-container" [ngSwitch]="view">

      <!-- Month View -->
      <mwl-calendar-month-view *ngSwitchCase="CalendarView.Month" [viewDate]="viewDate" [events]="events"
        [activeDayIsOpen]="activeDayIsOpen" locale="es" (dayClicked)="dayClicked($event.day)"
        (eventClicked)="handleEvent('Clicked', $event.event)">
      </mwl-calendar-month-view>

      <!-- Week View -->
      <mwl-calendar-week-view *ngSwitchCase="CalendarView.Week" [viewDate]="viewDate" [events]="events" locale="es"
        (eventClicked)="handleEvent('Clicked', $event.event)">
      </mwl-calendar-week-view>

      <!-- Day View -->
      <mwl-calendar-day-view *ngSwitchCase="CalendarView.Day" [viewDate]="viewDate" [events]="events" locale="es"
        (eventClicked)="handleEvent('Clicked', $event.event)">
      </mwl-calendar-day-view>

    </div>

  </mat-card-content>
</mat-card>
